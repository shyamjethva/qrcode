<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRGen Pro | Dynamic QR Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>QRGen Pro</span>
            </div>

        </div>
    </header>

    <main class="main">
        <section class="generator-section">
            <div class="container">
                <div class="top-bar-card">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="qr-slug">Link Name (Slug)</label>
                            <input type="text" id="qr-slug" placeholder="e.g. menu-card" autocomplete="off">
                        </div>

                        <div class="input-group">
                            <label for="qr-url">Destination URL</label>
                            <input type="text" id="qr-url" placeholder="https://example.com" autocomplete="off">
                        </div>

                        <div class="button-group">
                            <button id="generate-btn" class="btn btn-primary">
                                Create New QR
                            </button>
                        </div>
                    </div>
                </div>

                <div id="qr-modal-overlay" class="modal-overlay hidden">
                    <div id="qr-result" class="qr-result-centered">
                        <div class="qr-card relative">
                            <button id="close-modal-btn" class="close-modal-btn">&times;</button>
                            <div class="qr-image-container">
                                <img id="qr-image" src="" alt="Generated QR Code">
                            </div>
                            <div class="short-link-display">
                                <a id="display-short-link" href="#" target="_blank"
                                    style="text-decoration: none; color: var(--primary);">---</a>
                            </div>
                            <div class="input-group" style="margin-bottom: 1rem; text-align: left;">
                                <label for="modal-dest-url" style="font-size: 0.75rem;">Destination URL</label>
                                <input type="text" id="modal-dest-url" disabled
                                    style="padding: 0.5rem; font-size: 0.875rem; border-radius: 6px; border: 1px solid var(--border); width: 100%; background-color: #f8fafc;">
                                <div id="modal-success-msg"
                                    style="color: var(--secondary); font-size: 0.75rem; margin-top: 0.5rem; display: none;">
                                    Saved successfully!</div>
                            </div>
                            <div class="actions">
                                <button id="edit-btn" class="btn btn-primary btn-sm">
                                    <svg id="edit-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                    <svg id="save-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" style="display: none;">
                                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z">
                                        </path>
                                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                        <polyline points="7 3 7 8 15 8"></polyline>
                                    </svg>
                                    <span id="edit-btn-text">Edit</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="history-section">
                    <h2 class="section-title">Previous QR Codes</h2>
                    <div id="qr-history" class="history-grid">
                        <!-- History items will be injected here -->
                        <div class="history-empty">No previous QR codes yet</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 errorinfotech. All rights reserved.</p>
                <div class="footer-links">
                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                    <a href="#">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
