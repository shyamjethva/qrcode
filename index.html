<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRGen Pro | Dynamic QR Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>QRGen Pro</span>
            </div>

        </div>
    </header>

    <main class="main">
        <section class="hero">
            <div class="container">
                <div class="card">
                    <h1 class="card-title">Dynamic QR Generator</h1>
                    <p class="card-subtitle">Change the destination URL anytime WITHOUT changing the QR code image.</p>

                    <div class="input-groups">
                        <div class="input-group">
                            <label for="qr-slug">Link Name (Slug)</label>
                            <input type="text" id="qr-slug" placeholder="e.g. menu-card, summer-sale"
                                autocomplete="off">
                            <p class="slug-info">This will be part of your static short link.</p>
                        </div>

                        <div class="input-group">
                            <label for="qr-url">Destination URL</label>
                            <input type="text" id="qr-url" placeholder="https://yourwebsite.com/actual-page"
                                autocomplete="off">
                        </div>
                    </div>

                    <button id="generate-btn" class="btn btn-primary">
                        Save & Generate QR
                    </button>

                    <div id="qr-result" class="qr-result hidden">
                        <div class="short-link-display">
                            <span>Short Link: </span>
                            <span id="display-short-link">---</span>
                        </div>
                        <div class="qr-image-container">
                            <img id="qr-image" src="" alt="Generated QR Code">
                        </div>
                        <div class="actions">
                            <button id="download-btn" class="btn btn-secondary">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Download PNG
                            </button>
                            <button id="reset-btn" class="btn btn-ghost">Create New</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 errorinfotech. All rights reserved.</p>
                <div class="footer-links">
                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                    <a href="#">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
